spring:
  application:
    name: oba-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oba_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Theviya@123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8085}
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.oba: DEBUG
